<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <!-- a-frame libraries -->
    <script src="https://aframe.io/releases/1.0.3/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/donmccurdy/aframe-physics-system/v4.0.1/dist/aframe-physics-system.min.js"></script>
    <script src="https://unpkg.com/aframe-particle-system-component@1.0.x/dist/aframe-particle-system-component.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.1.0/dist/aframe-environment-component.min.js"></script>
    <script src="https://unpkg.com/aframe-text-geometry-component@0.5.1/dist/aframe-text-geometry-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.0/dist/aframe-extras.min.js"></script>
    <script src="https://rawgit.com/fernandojsg/aframe-teleport-controls/master/dist/aframe-teleport-controls.min.js"></script>
  </head>
  <body>
    <a-scene physics>
        <a-assets>
          <img id="background" src="images/background.jpeg">

          <a-asset-item id="smoltree-obj" src="models/smol-tree.obj"></a-asset-item>
          <a-asset-item id="smoltree-mtl" src="models/smol-tree.mtl"></a-asset-item>

          <a-asset-item id="tree-obj" src="models/tree.obj"></a-asset-item>
          <a-asset-item id="tree-mtl" src="models/tree.mtl"></a-asset-item>

          <a-asset-item id="frog-obj" src="models/frog.obj"></a-asset-item>
          <a-asset-item id="frog-mtl" src="models/frog.mtl"></a-asset-item>

          <a-asset-item id="cute-frog-obj" src="models/cute-frog.obj"></a-asset-item>
          <a-asset-item id="cute-frog-mtl" src="models/cute-frog.mtl"></a-asset-item>
        </a-assets>

        <a-entity id="cameraRig" wasd-controls movement-controls>
          <a-entity camera look-controls position="0 1.7 0"></a-entity>
          <a-entity id="head" camera="active: true" look-controls wasd-controls position="0 1.6 0"></a-entity>
          <a-entity oculus-touch-controls="hand: left" teleport-controls="button: trigger; cameraRig: #cameraRig; teleportOrigin: #head;"></a-entity>
          <a-entity oculus-touch-controls="hand: right" teleport-controls="button: trigger; cameraRig: #cameraRig; teleportOrigin: #head;"></a-entity>
          <a-entity vive-controls="hand: left" teleport-controls="button: trigger; cameraRig: #cameraRig; teleportOrigin: #head;"></a-entity>
          <a-entity vive-controls="hand: right" teleport-controls="button: trigger; cameraRig: #cameraRig; teleportOrigin: #head;"></a-entity>
        </a-entity>

        <a-entity environment="preset: goaland"></a-entity>

        <a-entity geometry = "primitive: plane" position = "0, .5, -5" scale = "100 100 2" material = "src: #background" rotation = "-90 0 0">
        </a-entity>

        <a-entity obj-model="obj: #smoltree-obj; mtl: #smoltree-mtl" position="-5.119 0 15.47" rotation="0 0 0" scale="2 2 2"
        animation="property: rotation; to: 0 360 0; dur: 15000; easing: linear; loop: true;"></a-entity>

        <a-entity obj-model="obj: #tree-obj; mtl: #tree-mtl" position="3 -0.227 14.88" rotation="0 0 0" scale="2 2 2"
        animation="property: rotation; to: 0 360 0; dur: 15000; easing: linear; loop: true;"></a-entity>

        <a-entity obj-model="obj: #tree-obj; mtl: #tree-mtl" position="12.474 -1 -3" rotation="0 0 0" scale="2 2 2"
        animation="property: rotation; to: 0 360 0; dur: 15000; easing: linear; loop: true;"></a-entity>

        <a-entity obj-model="obj: #tree-obj; mtl: #tree-mtl" position="-12.98 0.05 -2" rotation="0 0 0" scale="2 2 2"
        animation="property: rotation; to: 0 360 0; dur: 15000; easing: linear; loop: true;"></a-entity>

        <a-entity obj-model="obj: #tree-obj; mtl: #tree-mtl" position="-3 0.46 -9" rotation="0 0 0" scale="4 4 4"
        animation="property: rotation; to: 0 360 0; dur: 15000; easing: linear; loop: true;"></a-entity>

        <a-entity obj-model="obj: #frog-obj; mtl: #frog-mtl" position="-24.27 -0.219 23.346" rotation="-90 120 0" scale="4 4 4"></a-entity>

        <!--<a-entity obj-model="obj: #cute-frog-obj; mtl: #cute-frog-mtl" position="-18.67 -0.392 19.877" rotation="0 180 0" scale="0.001 0.001 0.001"></a-entity>-->
        <!--<a-entity fbx-model="src: models/cute-frog.fbx;" material="color: green" crossorigin="anonymous"></a-entity>-->
      </a-scene>
  </body>
</html>

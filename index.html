      window.addEventListener('error', function(error) {

  <body> 

    <h1>Eyes-Free Emoji Messaging</h1>

    <!------------------------------- RECEIVING W TIME --------------------------------->
    <h2>Receiving Messages: Time</h2>

    <script>
        function receiveThumbsUp() {
            navigator.vibrate(200);     // short
        }
        function receiveThumbsDown() {
            navigator.vibrate(700);     // long
        } 
        function receiveHeart() {
            navigator.vibrate([200, 50, 600, 50, 200, 50, 600, 50, 200, 20, 600]); // short-long 3 times
        }
        function receiveSmiley() {
            navigator.vibrate([200, 100, 200])       // short-short
        }
        function receiveSad() {
            navigator.vibrate([800, 100, 800])       // long-long
        }
        function receiveScream() {
            navigator.vibrate(2000);    // continuous, long
        }
    </script>

    <h3>Thumbs Up</h3>
    <div><button onclick="receiveThumbsUp()">Receive</button></div>

    <h3>Thumbs Down</h3>
    <div><button onclick="receiveThumbsDown()">Receive</button></div>

    <h3>Heart</h3>
    <div><button onclick="receiveHeart()">Receive</button></div>

    <h3>Smiley</h3>
    <div><button onclick="receiveSmiley()">Receive</button></div>

    <h3>Sad</h3>
    <div><button onclick="receiveSad()">Receive</button></div>
    
    <h3>Scream Face</h3>
    <div><button onclick="receiveScream()">Receive</button></div>
